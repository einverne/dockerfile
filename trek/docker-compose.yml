services:
  trek:
    image: mauriceboe/trek
    restart: always
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=${TZ:-Asia/Shanghai}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - COOKIE_SECURE=false
    volumes:
      - ${TREK_PATH}/data:/app/data
      - ${TREK_PATH}/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

