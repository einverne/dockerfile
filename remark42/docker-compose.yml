services:
  remark42:
    image: umputun/remark42:latest
    container_name: remark42
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "8042:8080"
    environment:
      - REMARK_URL=${URL}
      - SITE=${SITE}
      - SECRET=${SECRET}
      - STORE_TYPE=bolt
      - STORE_BOLT_PATH=/srv/var/db
      - BACKUP_PATH=/srv/var/backup
      - CACHE_TYPE=mem
      - DEBUG=true
      - AUTH_TELEGRAM=${AUTH_TELEGRAM}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - AUTH_ANON=true
      - ADMIN_PASSWD=${ADMIN_PASSWD}
      - AUTH_GITHUB_CID=${AUTH_GITHUB_CID}
      - AUTH_GITHUB_CSEC=${AUTH_GITHUB_CSEC}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_TLS=${SMTP_TLS}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - NOTIFY_ADMINS=email
      - NOTIFY_EMAIL_FROM=${NOTIFY_EMAIL_FROM}
      - ADMIN_SHARED_EMAIL=${ADMIN_SHARED_EMAIL}
      - NOTIFY_USERS=email
      - AUTH_EMAIL_ENABLE=true
      - AUTH_EMAIL_FROM=${AUTH_EMAIL_FROM}
    volumes:
      - ${STORAGE_PATH}:/srv/var
